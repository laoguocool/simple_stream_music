name: simple_stream_music
description: A lightweight music stream player for Android 4.4+
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ">=2.19.0 <3.8.0"
  flutter: "3.7.12"

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.9.31
  dio: ^4.0.6
  shared_preferences: ^2.2.2
  xml: ^6.1.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
